name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install aidoku-cli
        run: cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli

      - name: Build sources
        run: |
          cd sources/en.novelfire && aidoku package && cd ../..
          cd sources/en.lightnovelworld && aidoku package && cd ../..
          mkdir -p public
          aidoku build $(find sources -name "*.aix") -o public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
